l402:
  # Required: set the L402_SECRET_KEY environment variable before starting.
  # Generate a strong key with: openssl rand -hex 32
  # The application will refuse to start if this is empty or shorter than 32 characters.
  # NEVER commit a real secret key to source control.
  secret-key: "${L402_SECRET_KEY:}"
  location: "http://localhost:8080"
  expiry-seconds: 3600

server:
  port: 8080

logging:
  level:
    online.askahuman: DEBUG
